# RiseFlow API Railway config.
# Use when service Root Directory is set to src/RiseFlow.Api.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Dockerfile contains the runtime entrypoint.
healthcheckPath = "/health"

# Environment variables (set in Railway dashboard or link Postgres for DATABASE_URL):
# - DATABASE_URL          (auto when Postgres is linked)
# - Cors__AllowedOrigins  (e.g. https://your-app.vercel.app)
# - ASPNETCORE_ENVIRONMENT = Production
# - RiseFlow__VerificationBaseUrl (optional, for transcript verification links)
