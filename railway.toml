# Railway deploy config for monorepo root deployment.
# Railpack currently does not support C#/.NET, so deploy via Dockerfile.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "src/RiseFlow.Api/Dockerfile"

[deploy]
# Dockerfile defines ENTRYPOINT ["dotnet", "RiseFlow.Api.dll"].
healthcheckPath = "/"
